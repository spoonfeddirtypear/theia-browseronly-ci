name: Build & Publish Theia Browser-Only (latest)

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC — adjust to taste
  workflow_dispatch: {}    # manual trigger button in the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout eclipse-theia/theia (latest default branch)
        uses: actions/checkout@v4
        with:
          repository: eclipse-theia/theia
          path: theia
          fetch-depth: 1

      - name: Record source commit (for provenance/version.json)
        id: meta
        run: |
          cd theia
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install native build dependencies (native-keymap, an Electron-only addon still built by the monorepo's root postinstall even though browser-only doesn't need it, requires X11/xkbfile headers not present by default on GitHub-hosted runners)
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev

      - name: Install (npm ci — respects the committed package-lock.json; this repo uses npm, not yarn, per its own Developing.md/Gitpod/Devfile configs, confirmed live this session)
        working-directory: theia
        run: npm ci

      - name: Build browser-only example
        working-directory: theia
        run: npm run build:browser-only

      - name: Locate build output
        id: locate
        working-directory: theia/examples/browser-only
        run: |
          OUT_DIR=$(dirname "$(find . -maxdepth 4 -name index.html -not -path '*/node_modules/*' | head -n1)")
          if [ -z "$OUT_DIR" ]; then
            echo "::error::Could not locate a built index.html — build output structure may have changed."
            exit 1
          fi
          echo "Found build output at: $OUT_DIR"
          echo "dir=$OUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Write version.json (real, generated by this workflow — not simulated)
        working-directory: theia/examples/browser-only
        run: |
          cat > "${{ steps.locate.outputs.dir }}/version.json" <<EOF
          {
            "sourceRepo": "eclipse-theia/theia",
            "sourceCommit": "${{ steps.meta.outputs.sha }}",
            "builtAt": "${{ steps.meta.outputs.date }}",
            "workflowRun": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: theia/examples/browser-only/${{ steps.locate.outputs.dir }}

      - id: deployment
        uses: actions/deploy-pages@v4

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
